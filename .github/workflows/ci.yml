name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (core deps) + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Compile all modules
        run: python -m compileall -q *.py

      - name: Run tests
        run: pytest tests/ -q
        # Tests run on the minimal documented install (no spaCy/LLM SDKs):
        # extraction falls back to rules, the LLM to MockLLM, dense to hashing —
        # proving the tool degrades gracefully, never crashes.
